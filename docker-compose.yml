services:
  torznab:
    build: .
    ports:
      - "${TORZNAB_PORT:-9117}:9117"
    env_file: .env
    environment:
      SESSION_DIR: /data
      CHANNELS_FILE: /data/channels.json
      DOWNLOAD_DIR: /data/cache
      USER_CHANNELS_FILE: ${USER_CHANNELS_FILE:-}
    volumes:
      - ./data:/data
      - /mnt/ext2/Downloads:/data/cache
      - ${USER_CHANNELS_MOUNT:-/dev/null}:/data/user_channels.json:ro
    restart: unless-stopped

  torznab-auth:
    build: .
    env_file: .env
    environment:
      SESSION_DIR: /data
    volumes:
      - ./data:/data
    entrypoint: ["python3", "scripts/auth.py"]
    stdin_open: true
    tty: true
    profiles: [auth]
